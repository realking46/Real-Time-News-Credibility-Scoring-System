services:
  api:
    build: .
    container_name: news-credibility-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    command: uvicorn src.inference.api:app --host 0.0.0.0 --port 8000

  ui:
    build: .
    container_name: news-credibility-ui
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    command: streamlit run app/streamlit_app.py --server.address 0.0.0.0 --server.port 8501