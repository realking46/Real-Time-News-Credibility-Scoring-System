name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install a lightweight subset for CI (skip heavy ML deps)
          pip install pandas numpy pyarrow python-dotenv requests \
                      feedparser beautifulsoup4 lxml scikit-learn \
                      pytest ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v
